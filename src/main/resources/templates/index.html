<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo UASD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Consulta Catálogo de Carreras UASD</h3>
            </div>
            <div class="card-body">
                <form action="/" method="get" class="row g-3">
                    <div class="col-md-8">
                        <select name="escuela" class="form-select">
                            <option value="">-- Seleccione una Escuela --</option>
                            <option value="Ingeniería">Ingeniería</option>
                            <option value="Negocios">Negocios</option>
                            <option value="Artes">Artes</option>
                            <option value="Ciencias">Ciencias</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-dark w-100">Consultar</button>
                    </div>
                </form>

                <hr>

                <table class="table table-hover mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Carrera</th>
                            <th>Escuela</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${carreras}">
                            <td th:text="${c.id}"></td>
                            <td th:text="${c.nombre}"></td>
                            <td th:text="${c.escuela}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
